<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini CRM - Future Interns</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Client Lead Management System</h1>
        
        <div class="card">
            <h2>Add New Lead</h2>
            <form id="leadForm">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="text" id="source" placeholder="Source (e.g. Instagram, Referral)">
                <button type="submit">Save Lead</button>
            </form>
        </div>

        <div class="card">
            <h2>Lead Dashboard</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Source</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Action</th> </tr>
                </thead>
                <tbody id="leadsTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
